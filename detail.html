    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const id = parseInt(urlParams.get('id'));
            
            // 获取详情容器
            const detailContainer = document.getElementById('detailContainer');
            
            // 查找对应的数据
            const item = websiteData.find(item => item.id === id);
            
            // 如果找到数据，渲染详情页
            if (item) {
                renderDetail(item);
            } else {
                // 未找到数据，显示404页面
                detailContainer.innerHTML = `
                    <div class="ms-background-header" style="background-image: url('https://p9-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/79c435a671994d86a420a376d88450c8~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260315191315820B29C5641F3C0525F5&rrcfp=f06b921b&x-expires=1776165221&x-signature=GNYNpZjGqhwOFVpDVbJVWKJHX54%3D')">
                        <div class="ms-background-overlay"></div>
                        <div class="ms-background-gradient"></div>
                        <button class="ms-back-button-floating" onclick="window.location.href='index.html'">
                            ←
                        </button>
                    </div>
                    
                    <div class="ms-not-found">
                        <h1>404</h1>
                        <p>未找到该网址信息</p>
                        <button class="ms-btn ms-btn-primary" onclick="window.location.href='index.html'">返回首页</button>
                    </div>
                `;
            }
            
            // 返回首页链接点击事件
            document.addEventListener('click', function(e) {
                if (e.target.matches('.back-link') || e.target.closest('.back-link')) {
                    window.location.href = 'index.html';
                }
                
                // 访问网站按钮点击事件
                if (e.target.matches('.btn-visit') || e.target.closest('.btn-visit')) {
                    if (item.url && item.url !== '#') {
                        window.open(item.url, '_blank');
                    } else {
                        alert('该链接暂未设置');
                    }
                }
            });
        });
        
        // 渲染详情页函数
        function renderDetail(item) {
            const detailContainer = document.getElementById('detailContainer');
            
            // 构建分类和标签的显示文本
            const categoryMap = {
                'Mythware': '极域工具',
                'games': '小游戏',
            };
            
            const tagMap = {
                'ai': 'AI制作',
                'student-make': '同学自制',
                'large-scale': '大型平台',
                'all': '全部平台'
            };
            
            const categoryText = categoryMap[item.category] || item.category;
            const tagsText = item.tags.map(tag => tagMap[tag] || tag).join('、');
            
            // 获取详情数据
            const details = item.details || {};
            
            // 渲染系统要求
            let systemRequirementsHTML = '';
            if (details.systemRequirements) {
                for (const [key, value] of Object.entries(details.systemRequirements)) {
                    // 将键名转换为更友好的显示格式
                    const label = key.charAt(0).toUpperCase() + key.slice(1).replace(/([A-Z])/g, ' $1');
                    systemRequirementsHTML += `
                        <div class="info-item">
                            <label>${label}</label>
                            <value>${value}</value>
                        </div>
                    `;
                }
            }
            
            // 渲染特性列表
            let featuresHTML = '';
            if (details.features && details.features.length > 0) {
                featuresHTML = details.features.map(feature => `
                    <li class="feature-item">${feature}</li>
                `).join('');
                featuresHTML = `<ul class="feature-list">${featuresHTML}</ul>`;
            }
            
            // 渲染相关链接
            let relatedLinksHTML = '';
            if (details.relatedLinks && details.relatedLinks.length > 0) {
                relatedLinksHTML = details.relatedLinks.map(link => `
                    <a href="${link.url}" target="_blank" class="related-link">${link.name}</a>
                `).join('');
                relatedLinksHTML = `<div class="related-links">${relatedLinksHTML}</div>`;
            }
            
            // 渲染评分
            let ratingHTML = '';
            if (details.rating) {
                const fullStars = Math.floor(details.rating);
                const hasHalfStar = details.rating % 1 >= 0.5;
                const emptyStars = 5 - fullStars - (hasHalfStar ? 1 : 0);
                
                let starsHTML = '★'.repeat(fullStars);
                if (hasHalfStar) starsHTML += '½';
                starsHTML += '☆'.repeat(emptyStars);
                
                ratingHTML = `
                    <div class="info-item">
                        <label>评分</label>
                        <value class="rating">${starsHTML} (${details.rating}/5)</value>
                    </div>
                `;
            }
            
            // 渲染详情内容
            detailContainer.innerHTML = `
                <!-- 模糊背景和返回按钮 -->
                <div class="ms-background-header" style="background-image: url('${item.previewImage || item.icon}')">
                    <div class="ms-background-overlay"></div>
                    <div class="ms-background-gradient"></div>
                    <button class="ms-back-button-floating" onclick="window.location.href='index.html'">
                        ←
                    </button>
                </div>
                
                <div class="ms-content">
                    <!-- 应用信息区 - 与背景衔接，无背景 -->
                    <div class="ms-app-info-section">
                        <div class="ms-app-info-container">
                            <div class="ms-app-icon-large">
                                <img src="${item.icon}" alt="${item.title}">
                            </div>
                            <div class="ms-app-details">
                                <h1 class="ms-app-title-main">${item.title}</h1>
                                <div class="ms-app-meta">
                                    <span class="ms-app-developer">${details.developer || '未知开发者'}</span>
                                    ${details.releaseDate ? `<span class="ms-app-date">• ${details.releaseDate}</span>` : ''}
                                </div>
                                
                                <!-- 操作按钮 -->
                                <div class="ms-main-actions">
                                    <button class="ms-btn ms-btn-primary ms-btn-large btn-visit">
                                        🌐 访问网站
                                    </button>
                                    <button class="ms-btn ms-btn-secondary" onclick="window.location.href='index.html'">
                                        ← 返回
                                    </button>
                                </div>
                                
                                <!-- 标签 -->
                                <div class="ms-app-tags">
                                    <span class="ms-tag">${categoryText}</span>
                                    ${item.tags.map(tag => `<span class="ms-tag">${tagMap[tag] || tag}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 主内容区域 -->
                    <div class="ms-main-content">
                        <!-- 屏幕截图板块 -->
                        <div class="ms-card">
                            <h2 class="ms-card-title">屏幕截图</h2>
                            <div class="ms-screenshot-carousel">
                                ${renderScreenshots(item)}
                            </div>
                        </div>
                        
                        <!-- 详情介绍板块 -->
                        <div class="ms-card">
                            <h2 class="ms-card-title">详情</h2>
                            <div class="ms-card-content">
                                <p class="ms-description-text">
                                    ${details.fullDescription || item.description || '暂无详细介绍。这是一个功能强大的工具，为用户提供高效便捷的服务体验。无论是日常使用还是专业工作，都能满足您的各种需求。'}
                                </p>
                            </div>
                        </div>
                        
                        <!-- 评分板块 -->
                        <div class="ms-card">
                            <h2 class="ms-card-title">评分</h2>
                            <div class="ms-card-content">
                                <div class="ms-rating-display">
                                    <div class="ms-rating-overview">
                                        <div class="ms-rating-score-large">${details.rating || '0.0'}</div>
                                        <div class="ms-rating-stars-large">
                                            ${renderStars(details.rating || 0)}
                                        </div>
                                        <div class="ms-rating-count-text">基于 ${details.reviewCount || '0'} 条评价</div>
                                    </div>
                                    <div class="ms-rating-bar">
                                        <div class="ms-rating-progress">
                                            <div class="ms-rating-progress-fill" style="width: ${(details.rating || 0) / 5 * 100}%"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 功能板块 -->
                        ${details.features && details.features.length > 0 ? `
                        <div class="ms-card">
                            <h2 class="ms-card-title">功能</h2>
                            <div class="ms-card-content">
                                <ul class="ms-features-list">
                                    ${details.features.map(feature => `
                                        <li class="ms-feature-list-item">
                                            <div class="ms-feature-icon">✓</div>
                                            <div class="ms-feature-text">${feature}</div>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>
                        ` : ''}
                        
                        <!-- 新增功能板块 -->
                        ${details.newFeatures && details.newFeatures.length > 0 ? `
                        <div class="ms-card">
                            <h2 class="ms-card-title">新增功能</h2>
                            <div class="ms-card-content">
                                <ul class="ms-features-list">
                                    ${details.newFeatures.map(feature => `
                                        <li class="ms-feature-list-item">
                                            <div class="ms-feature-icon">✨</div>
                                            <div class="ms-feature-text">${feature}</div>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>
                        ` : ''}
                        
                        <!-- 系统要求板块 -->
                        ${details.systemRequirements ? `
                        <div class="ms-card">
                            <h2 class="ms-card-title">系统要求</h2>
                            <div class="ms-card-content">
                                <div class="ms-system-requirements-grid">
                                    ${Object.entries(details.systemRequirements).map(([key, value]) => {
                                        const label = key.charAt(0).toUpperCase() + key.slice(1).replace(/([A-Z])/g, ' $1');
                                        return `
                                            <div class="ms-requirement-row">
                                                <div class="ms-requirement-label">${label}</div>
                                                <div class="ms-requirement-value">${value}</div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                        ` : ''}
                        
                        <!-- 更多信息板块 -->
                        <div class="ms-card">
                            <h2 class="ms-card-title">更多信息</h2>
                            <div class="ms-card-content">
                                <div class="ms-more-info-grid">
                                    <div class="ms-info-item">
                                        <div class="ms-info-label">发布日期</div>
                                        <div class="ms-info-value">${details.releaseDate || '未知'}</div>
                                    </div>
                                    <div class="ms-info-item">
                                        <div class="ms-info-label">开发者</div>
                                        <div class="ms-info-value">${details.developer || '未知'}</div>
                                    </div>
                                    <div class="ms-info-item">
                                        <div class="ms-info-label">分类</div>
                                        <div class="ms-info-value">${categoryText}</div>
                                    </div>
                                    <div class="ms-info-item">
                                        <div class="ms-info-label">标签</div>
                                        <div class="ms-info-value">${tagsText}</div>
                                    </div>
                                </div>
                                
                                <!-- 相关链接 -->
                                ${details.relatedLinks && details.relatedLinks.length > 0 ? `
                                <div class="ms-related-links-section">
                                    <h3 class="ms-section-subtitle">相关链接</h3>
                                    <div class="ms-related-links-grid">
                                        ${details.relatedLinks.map(link => `
                                            <a href="${link.url}" target="_blank" class="ms-related-link-card">
                                                <div class="ms-link-icon">🔗</div>
                                                <div class="ms-link-text">${link.name}</div>
                                            </a>
                                        `).join('')}
                                    </div>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // 渲染星星评分
            function renderStars(rating) {
                const fullStars = Math.floor(rating);
                const hasHalfStar = rating % 1 >= 0.5;
                const emptyStars = 5 - fullStars - (hasHalfStar ? 1 : 0);
                
                let starsHTML = '';
                starsHTML += '★'.repeat(fullStars);
                if (hasHalfStar) starsHTML += '½';
                starsHTML += '☆'.repeat(emptyStars);
                
                return starsHTML.split('').map(char => `<span class="ms-star">${char}</span>`).join('');
            }
            
            // 渲染截图
            function renderScreenshots(item) {
                const screenshots = details.screenshots || [];
                const previewImage = item.previewImage || item.icon;
                
                // 如果没有截图，使用预览图或图标
                if (screenshots.length === 0) {
                    return `
                        <div class="ms-screenshot-item">
                            <img src="${previewImage}" alt="${item.title} 预览">
                        </div>
                    `;
                }
                
                // 渲染所有截图
                return screenshots.map(screenshot => `
                    <div class="ms-screenshot-item">
                        <img src="${screenshot}" alt="${item.title} 截图">
                    </div>
                `).join('');
            }
            
            // 移除旧的样式添加代码，使用CSS类定义的样式
        }
    </script>
</body>
</html>
